services:
  # Enable nginx in development - can be accessed via NGINX_PORT (7000)
  nginx: # Removed profiles to enable in dev

  backend:
    build:
      target: development
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev

  frontend:
    build:
      target: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - ./mcp-server:/app/mcp-server
    environment:
      - NODE_ENV=development
      - BACKEND_BASE_URL=${BACKEND_BASE_URL:-http://backend:7002}
      - PORT=7001
      - NEXT_PUBLIC_EXPLORER_BASE_URL=${NEXT_PUBLIC_EXPLORER_BASE_URL:-http://localhost:3021}
    # Expose port to host for direct access in development (Next.js direct)
    ports:
      - "${DOCKER_BIND_HOST:-0.0.0.0}:7001:7001"
    command: npm run dev -- -p 7001 -H 0.0.0.0
    # Override healthcheck for development
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:7001/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      - backend
